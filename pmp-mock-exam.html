<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP 模擬試験 v2.1 - PMBOK 7th Edition</title>
<style>
:root{--bg:#f5f5f5;--bg2:#fff;--bg3:#e8e8e8;--text:#222;--text2:#666;--border:#ddd;--card:#fff;--accent:#e68a00;--accent2:#cc7a00;--correct:#2e7d32;--wrong:#c62828;--exp-bg:#fff8e1;--shadow:0 2px 8px rgba(0,0,0,.06)}
[data-theme="dark"]{--bg:#0a0a1a;--bg2:#111122;--bg3:#1a1a2e;--text:#e0e0e0;--text2:#999;--border:#1a1a2e;--card:#111122;--accent:#ff9900;--accent2:#ffb84d;--correct:#4caf50;--wrong:#f44336;--exp-bg:#0d1b2a;--shadow:0 2px 8px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Meiryo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;-webkit-overflow-scrolling:touch;overscroll-behavior:none}
.container{max-width:900px;margin:0 auto;padding:16px}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:4px;position:relative;z-index:10}
.home-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:all .2s;display:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.home-btn:hover,.home-btn:active{border-color:var(--accent);color:var(--accent)}
.theme-toggle{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:16px;transition:all .2s;color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.theme-toggle:hover,.theme-toggle:active{border-color:var(--accent)}
.exam-banner{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border-radius:10px;padding:10px 16px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;gap:8px}
.exam-banner .icon{font-size:18px}
header{text-align:center;padding:20px 0 16px;border-bottom:2px solid var(--bg3)}
header h1{font-size:24px;color:var(--accent);margin-bottom:4px}
header p{color:var(--text2);font-size:12px}
.screen{display:none}.screen.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin:12px 0;box-shadow:var(--shadow)}
.exam-info{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:12px;flex-wrap:wrap;gap:6px}
.exam-info .stat{text-align:center;flex:1;min-width:65px}
.exam-info .stat .label{font-size:10px;color:var(--text2);text-transform:uppercase}
.exam-info .stat .value{font-size:18px;font-weight:700;color:var(--accent)}
.progress-bar{width:100%;height:5px;background:var(--bg3);border-radius:3px;margin:10px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-number{font-size:13px;color:var(--accent);font-weight:600}
.q-domain{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--bg3)}
.q-domain.people{color:#1565c0;border:1px solid #1565c033}
.q-domain.process{color:#2e7d32;border:1px solid #2e7d3233}
.q-domain.business{color:#e65100;border:1px solid #e6510033}
[data-theme="dark"] .q-domain.people{color:#4fc3f7;border-color:#4fc3f733}
[data-theme="dark"] .q-domain.process{color:#66bb6a;border-color:#66bb6a33}
[data-theme="dark"] .q-domain.business{color:#ffb74d;border-color:#ffb74d33}
.q-text{font-size:15px;line-height:1.7;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;line-height:1.5;font-size:14px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.option:hover:not(.locked){border-color:var(--accent);background:rgba(230,138,0,.04)}
.option.correct{border-color:var(--correct);background:rgba(46,125,50,.08)}
.option.correct::after{content:'✓ 正解';margin-left:auto;color:var(--correct);font-weight:700;font-size:12px;flex-shrink:0;white-space:nowrap}
.option.wrong{border-color:var(--wrong);background:rgba(198,40,40,.06)}
.option.wrong::after{content:'✗';margin-left:auto;color:var(--wrong);font-weight:700;font-size:16px;flex-shrink:0}
.option.locked{cursor:default;opacity:.85}
.option.locked.dim{opacity:.45}
.explanation{margin-top:14px;padding:16px;background:var(--exp-bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;line-height:1.8;font-size:13px;display:none}
.explanation.show{display:block;animation:fadeIn .3s}
.explanation strong{color:var(--accent)}
.glossary{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
.glossary-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px}
.glossary-item{margin-bottom:6px;font-size:12px;line-height:1.6}
.glossary-item .term{font-weight:700;color:var(--text)}
.glossary-item .def{color:var(--text2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{opacity:.8}
.btn-danger{background:transparent;color:var(--wrong);border:1px solid var(--wrong);font-size:12px;padding:8px 14px}
.btn-danger:hover{background:var(--wrong);color:#fff}
.btn-group{display:flex;gap:8px;justify-content:center;margin:18px 0;flex-wrap:wrap}
.timer{font-size:18px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.timer.warning{color:var(--wrong);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.score-circle{width:140px;height:140px;border-radius:50%;margin:12px auto;display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-circle .score-num{font-size:42px;font-weight:700}
.score-circle .score-label{font-size:11px;color:var(--text2)}
.score-pass{border:4px solid var(--correct);box-shadow:0 0 20px rgba(46,125,50,.15)}
.score-fail{border:4px solid var(--wrong);box-shadow:0 0 20px rgba(198,40,40,.15)}
.domain-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.domain-row .name{width:170px;font-size:12px;color:var(--text2)}
.domain-row .bar{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.domain-row .bar .fill-d{height:100%;border-radius:4px;transition:width .5s}
.domain-row .pct{width:45px;text-align:right;font-weight:600;font-size:13px}
.nav-dots{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:10px 0}
.nav-dot{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;transition:all .15s;background:var(--bg2)}
.nav-dot.current{border-color:var(--accent);box-shadow:0 0 6px rgba(230,138,0,.25)}
.nav-dot.answered-correct{background:rgba(46,125,50,.15);border-color:var(--correct);color:var(--correct)}
.nav-dot.answered-wrong{background:rgba(198,40,40,.1);border-color:var(--wrong);color:var(--wrong)}
[data-theme="dark"] .nav-dot.answered-correct{background:rgba(76,175,80,.2)}
[data-theme="dark"] .nav-dot.answered-wrong{background:rgba(244,67,54,.15)}
.streak-bar{text-align:center;padding:5px;font-size:12px;color:var(--text2)}
.streak-bar span{color:var(--accent);font-weight:700}
.set-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin:8px 0;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;position:relative;z-index:1}
.set-card:hover,.set-card:active{border-color:var(--accent)}
.set-card h3{color:var(--accent);margin-bottom:5px;font-size:15px;pointer-events:none}
.set-card p{color:var(--text2);font-size:12px;margin-bottom:6px;pointer-events:none}
.set-card .meta{display:flex;gap:12px;font-size:11px;color:var(--text2);flex-wrap:wrap;pointer-events:none}
.high-score{color:var(--correct);font-weight:600}
.review-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin:6px 0;cursor:pointer;font-size:12px}
.review-item:hover{border-color:var(--accent)}
.ri-header{display:flex;justify-content:space-between;align-items:center}
.ri-status{font-size:11px;padding:2px 8px;border-radius:4px}
.ri-correct{background:rgba(46,125,50,.1);color:var(--correct)}
.ri-wrong{background:rgba(198,40,40,.1);color:var(--wrong)}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:28px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalIn .2s}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{margin-bottom:10px;font-size:17px}
.modal p{color:var(--text2);font-size:13px;margin-bottom:18px;line-height:1.6}
.modal .btn-group{margin:0}
.speak-btn{background:var(--accent);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;flex-shrink:0}
.speak-btn:hover{background:var(--accent2);transform:scale(1.1)}
.speak-btn.speaking{animation:pulse 1s infinite;background:var(--wrong)}
.vol-controls{display:none;gap:12px;padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;font-size:11px;color:var(--text2);justify-content:flex-end;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.vol-controls.active{display:flex}
.vol-group{display:flex;align-items:center;gap:6px}
.vol-group .vol-icon{font-size:13px;opacity:.7}
.vol-group .vol-val{min-width:28px;text-align:center;font-variant-numeric:tabular-nums;font-weight:500;color:var(--text);font-size:11px}
.vol-btn{width:28px;height:28px;border:none;border-radius:50%;background:var(--bg3);color:var(--text);font-size:15px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:all .15s;line-height:1}
.vol-btn:active{background:var(--accent);color:#fff;transform:scale(.9)}
.speak-progress{display:none;align-items:center;gap:6px;margin-top:4px;font-size:10px;color:var(--text2);width:120px}
.speak-progress.active{display:flex}
.speak-progress .bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.speak-progress .bar .fill-s{height:100%;background:var(--accent);border-radius:2px;transition:width .5s linear}
.speak-progress .time{min-width:28px;text-align:right;font-variant-numeric:tabular-nums}
.speak-wrap{display:flex;flex-direction:column;align-items:center}
</style>
</head>
<body>
<div class="container">
<div class="top-bar">
<button class="home-btn" id="home-btn" onclick="confirmHome()">← ホーム</button>
<div class="theme-toggle" onclick="toggleTheme()" title="テーマ切替">☀️</div>
</div>
<div class="vol-controls" id="vol-controls">
<div class="vol-group"><span class="vol-icon">🔊</span><button class="vol-btn" onclick="adjVol('tts',-1)">−</button><span class="vol-val" id="vol-tts-val">80</span><button class="vol-btn" onclick="adjVol('tts',1)">+</button></div>
<div class="vol-group"><span class="vol-icon">🎵</span><button class="vol-btn" onclick="toggleBgm()" id="bgm-toggle" style="font-size:11px;width:auto;padding:0 8px">OFF</button></div>
</div>

<div id="select-screen" class="screen active">
<div class="exam-banner"><span class="icon">📅</span> PMP試験は通年受験可能（CBT方式）。ピアソンVUEで随時予約できます。申込から1年以内に受験が必要です。</div>
<header>
<h1>🎯 PMP 模擬試験</h1>
<p>PMBOK 7th Edition / ECO 2021 — People 42% | Process 50% | Business Environment 8%<br><span style="font-size:10px;color:var(--text2)">v2.1</span></p>
</header>
<div class="card" style="text-align:center">
<h2 style="color:var(--accent);margin-bottom:6px;font-size:18px">問題セットを選択</h2>
<p style="color:var(--text2);font-size:12px">各セット30問 / 制限時間38分（実試験ペース: 180問230分 ≈ 1問76秒）</p>
</div>
<div id="set-list"></div>
</div>

<div id="exam-screen" class="screen">
<div class="exam-info">
<div class="stat"><div class="label">問題</div><div class="value" id="q-counter">1/30</div></div>
<div class="stat"><div class="label">残り時間</div><div class="timer" id="timer">38:00</div></div>
<div class="stat"><div class="label">正解</div><div class="value" id="correct-count" style="color:var(--correct)">0</div></div>
<div class="stat"><div class="label">不正解</div><div class="value" id="wrong-count" style="color:var(--wrong)">0</div></div>
</div>
<div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
<div class="streak-bar" id="streak-bar"></div>
<div class="nav-dots" id="nav-dots"></div>
<div id="question-area"></div>
<div class="btn-group">
<button class="btn btn-secondary" onclick="prevQ()">← 前へ</button>
<button class="btn btn-primary" id="next-btn" onclick="nextQ()" style="display:none">次の問題 →</button>
<button class="btn btn-primary" id="finish-btn" onclick="showResults()" style="display:none">結果を見る 📊</button>
<button class="btn btn-danger" onclick="confirmReset()">🔄 最初から</button>
</div>
</div>

<div id="result-screen" class="screen">
<div class="card" style="text-align:center">
<h2 id="result-title" style="margin-bottom:8px"></h2>
<div class="score-circle" id="score-circle"><div class="score-num" id="score-num"></div><div class="score-label">正答率</div></div>
<p id="result-msg" style="margin:10px 0;color:var(--text2);font-size:13px"></p>
</div>
<div class="card"><h3 style="margin-bottom:10px;color:var(--accent);font-size:14px">ドメイン別スコア</h3><div id="domain-breakdown"></div></div>
<div class="card"><h3 style="margin-bottom:10px;color:var(--accent);font-size:14px">全問レビュー（タップで解説）</h3><div id="review-list"></div></div>
<div class="btn-group"><button class="btn btn-primary" onclick="confirmHome()">問題セット選択に戻る</button></div>
</div>
</div>

<div class="modal-overlay" id="modal-overlay">
<div class="modal">
<h3 id="modal-title"></h3>
<p id="modal-msg"></p>
<div class="btn-group" id="modal-buttons"></div>
</div>
</div>

<script>
// PMP模擬試験 問題データ — PMBOK 7th Edition / ECO 2021準拠
// 5セット × 30問 = 150問
// ドメイン配分: People ~42%, Process ~50%, Business Environment ~8%

const EXAM_SETS = [
{
name: "模擬試験 1: 基礎編",
desc: "PMBOKの基本概念、プロセス、ツールを中心に出題",
questions: [
{d:"People",q:"あなたはアジャイルプロジェクトのPMです。チームメンバーの一人が、他のメンバーとの対立により生産性が低下しています。最初に取るべきアクションは何ですか？",o:["A. 対立しているメンバーを別のチームに異動させる","B. 1対1のミーティングで状況を把握し、コーチングを行う","C. チーム全体のレトロスペクティブで問題を議論する","D. マネージャーにエスカレーションする"],a:1,e:"サーバントリーダーとして、まず個別に状況を理解し、コーチングで解決を図ることが重要です。",g:[
  {t:"サーバントリーダーシップ",d:"チームに奉仕し、障害を取り除き、メンバーの成長を支援するリーダーシップスタイル。アジャイルで重視される。"},
  {t:"コーチング",d:"個人の成長を促すための対話的な支援手法。指示ではなく質問を通じて気づきを促す。"}
]},
{d:"Process",q:"プロジェクトのスコープベースラインが承認された後、顧客から新しい要件が追加されました。PMとして最初に行うべきことは何ですか？",o:["A. 変更要求を統合変更管理プロセスに提出する","B. 要件をすぐにスコープに追加する","C. 顧客に追加費用を請求する","D. チームに新しい要件の実装を指示する"],a:0,e:"スコープベースライン承認後の変更は、統合変更管理プロセスを通じて正式に評価・承認される必要があります。",g:[
  {t:"スコープベースライン",d:"承認されたスコープ記述書、WBS、WBS辞書の組み合わせ。変更管理の基準となる。"},
  {t:"統合変更管理",d:"プロジェクト全体の変更要求を評価・承認・管理するプロセス。CCBが判断する。"},
  {t:"変更管理委員会（CCB）",d:"変更要求の承認・却下・延期を決定する権限を持つ組織体。"}
]},
{d:"People",q:"バーチャルチームのメンバーが異なるタイムゾーンにいるため、コミュニケーションに課題があります。最も効果的なアプローチは何ですか？",o:["A. 全員が同じ時間にオンラインになることを義務付ける","B. 非同期コミュニケーションツールと重複時間帯の定例会議を組み合わせる","C. コミュニケーションをメールのみに限定する","D. 各タイムゾーンにサブリーダーを配置する"],a:1,e:"バーチャルチームでは、非同期ツールと重複時間帯での同期ミーティングの組み合わせが最も効果的です。",g:[
  {t:"バーチャルチーム",d:"地理的に分散したメンバーで構成されるチーム。テクノロジーを活用して協働する。"},
  {t:"非同期コミュニケーション",d:"リアルタイムでなく、各自の都合で情報を送受信する方法。Slack、メール等が該当する。"}
]},
{d:"Process",q:"アーンドバリュー分析でCPI=0.85、SPI=1.1の場合、プロジェクトの状況はどれですか？",o:["A. 予算超過かつスケジュール遅延","B. 予算内かつスケジュール前倒し","C. 予算超過だがスケジュールは前倒し","D. 予算内だがスケジュール遅延"],a:2,e:"CPI<1は予算超過、SPI>1はスケジュール前倒しを意味します。",g:[
  {t:"アーンドバリュー分析（EVA）",d:"計画値・出来高・実コストを比較してプロジェクトの進捗とコスト効率を測定する手法。"},
  {t:"CPI（コスト効率指数）",d:"EV÷ACで算出。1未満は予算超過、1超は予算内を示す。コスト効率の指標。"},
  {t:"SPI（スケジュール効率指数）",d:"EV÷PVで算出。1未満は遅延、1超は前倒しを示す。スケジュール効率の指標。"}
]},
{d:"Business Environment",q:"プロジェクトスポンサーが、組織の戦略目標との整合性を確認するよう求めています。最も適切なツールは何ですか？",o:["A. ガントチャート","B. ベネフィット実現計画書","C. WBS","D. リスク登録簿"],a:1,e:"ベネフィット実現計画書は、プロジェクトの成果が組織の戦略目標にどのように貢献するかを定義し追跡するためのツールです。",g:[
  {t:"ベネフィット実現計画書",d:"プロジェクトの成果が組織にもたらす便益を定義し、その実現を追跡するための文書。"},
  {t:"プロジェクトスポンサー",d:"プロジェクトに資金やリソースを提供し、最終的な意思決定権を持つ上位マネジメント。"},
  {t:"戦略的整合性",d:"プロジェクトの目標が組織全体の戦略目標と一致していること。プロジェクト選定の重要基準。"}
]},

{d:"People",q:"リスクワークショップで、チームメンバーが楽観的すぎるリスク評価をしています。どうすべきですか？",o:["A. メンバーの評価をそのまま受け入れる","B. デルファイ法や過去のプロジェクトデータを使って客観性を高める","C. PMが独自にリスク評価を行う","D. リスク評価を外部コンサルタントに委託する"],a:1,e:"デルファイ法（匿名の専門家意見収集）や過去のプロジェクトデータを活用することで、バイアスを軽減し客観的な評価を行えます。",g:[

  {t:"感度分析",d:"各リスク要因がプロジェクト目標に与える影響の大きさを比較する分析手法。トルネード図で可視化する。"},

{d:"Process",q:"品質監査の主な目的は何ですか？",o:["A. 成果物の欠陥を見つける","B. プロジェクトのプロセスが組織の方針と手順に準拠しているか確認する","C. チームのパフォーマンスを評価する","D. 予算の使用状況を確認する"],a:1,e:"品質監査は、プロジェクトのプロセスが組織の方針、手順、標準に準拠しているかを確認する品質保証活動です。",g:[
  {t:"品質監査",d:"プロジェクトのプロセスが組織の方針・手順・標準に準拠しているか確認する品質保証活動。"},

]},
{d:"Business Environment",q:"規制要件の変更がプロジェクトに影響を与える場合、最初に行うべきことは？",o:["A. プロジェクトを中止する","B. 影響分析を実施し、変更管理プロセスを通じて対応する","C. 規制要件を無視する","D. 法務部門に全て任せる"],a:1,e:"規制要件の変更は外部環境の変化です。まず影響分析を行い、変更管理プロセスを通じてプロジェクト計画を更新します。",g:[

]},
{d:"Process",q:"調達クロージングで実施すべき重要なアクティビティは？",o:["A. 新しい調達を開始する","B. 契約条件の履行確認、最終支払い、教訓の文書化","C. サプライヤーとの関係を断つ","D. 調達文書を破棄する"],a:1,e:"調達クロージングでは、契約条件の履行確認、最終支払い処理、教訓の文書化、調達文書のアーカイブを行います。",g:[

]},
{d:"People",q:"プロジェクトのリスク許容度が低いステークホルダーがいます。どのように対応すべきですか？",o:["A. そのステークホルダーの意見を無視する","B. リスク対応策を詳細に説明し、残存リスクのレベルについて合意を得る","C. 全てのリスクを排除すると約束する","D. リスク情報を共有しない"],a:1,e:"リスク許容度が低いステークホルダーには、リスク対応策を詳細に説明し、残存リスクのレベルについて明確な合意を得ることが重要です。",g:[

{d:"People",q:"調達先の選定で、最も低い価格を提示したベンダーが技術的に最も弱い場合、どうすべきですか？",o:["A. 最低価格のベンダーを選ぶ","B. 価格と技術力を含む総合評価基準に基づいて選定する","C. 技術力が最も高いベンダーを選ぶ","D. 全てのベンダーを不採用にする"],a:1,e:"調達先選定は、価格だけでなく技術力、実績、リスク等を含む総合評価基準（重み付け基準）に基づいて行うべきです。",g:[

desc: "全ドメインから実践的なシチュエーション問題を出題。本番に最も近い難易度",
questions: [
{d:"Process",q:"プロジェクトの途中で、スポンサーが予算を20%削減すると通知しました。PMとして最初に行うべきことは？",o:["A. チームに残業を指示してコストを削減する","B. 予算削減の影響分析を行い、スコープ・スケジュール・品質への影響をスポンサーに提示する","C. 品質基準を下げる","D. チームメンバーを解雇する"],a:1,e:"まず影響分析を行い、トリプルコンストレイント（スコープ・スケジュール・コスト・品質）への影響を明確にしてスポンサーと協議します。",g:[
  {t:"トリプルコンストレイント",d:"スコープ・スケジュール・コストの3つの制約。一つを変更すると他に影響する。品質を含め4要素とも。"},
  {t:"影響分析",d:"変更がプロジェクトの各要素に与える影響を評価するプロセス。意思決定の基礎情報を提供する。"}
]},
{d:"People",q:"プロジェクトチームのシニアメンバーが、ジュニアメンバーの意見を常に却下しています。最も適切な対応は？",o:["A. シニアメンバーの判断を尊重する","B. チームの行動規範を見直し、全メンバーの意見が尊重される環境を作る","C. ジュニアメンバーに発言を控えるよう指示する","D. シニアメンバーをチームから外す"],a:1,e:"心理的安全性の確保はPMの重要な責務です。行動規範の見直しを通じて、全メンバーの意見が尊重される環境を構築します。",g:[
  {t:"心理的安全性",d:"チーム内で自分の意見を安心して表明できる環境。イノベーションと高パフォーマンスの基盤となる。"},
  {t:"行動規範（チームチャーター）",d:"チームが合意した行動ルール。コミュニケーション方法、意思決定プロセス、対立解決方法等を定める。"}
]},
{d:"Process",q:"プロジェクトのEAC（完了時総コスト見積り）を計算する際、過去のパフォーマンスが今後も続くと仮定する場合の計算式は？",o:["A. EAC = AC + (BAC - EV)","B. EAC = BAC / CPI","C. EAC = AC + ETC","D. EAC = BAC - EV"],a:1,e:"過去のパフォーマンス（CPI）が今後も続くと仮定する場合、EAC = BAC / CPI。CPIが0.8なら、当初予算の125%のコストが見込まれます。",g:[
  {t:"EAC（完了時総コスト見積り）",d:"プロジェクト完了時の総コスト予測。複数の計算式があり、前提条件により使い分ける。"},
  {t:"BAC（完了時総予算）",d:"プロジェクト完了に必要な当初承認済み予算の総額。パフォーマンス測定の基準となる。"},
  {t:"AC（実コスト）",d:"特定時点までに実際に発生したコスト。EVAの3要素の一つ。"}
]},
{d:"People",q:"プロジェクトで、チームメンバーが個人的な問題を抱えてパフォーマンスが低下しています。PMとして最も適切な対応は？",o:["A. パフォーマンス改善計画を即座に作成する","B. 共感を示しつつ、利用可能なサポートリソース（EAP等）を案内する","C. 個人的な問題には関与しない","D. そのメンバーの作業を他のメンバーに再割り当てする"],a:1,e:"PMはチームメンバーの福祉にも配慮する責任があります。共感を示し、組織が提供するサポートリソースを案内することが適切です。",g:[
  {t:"EAP（従業員支援プログラム）",d:"従業員の個人的な問題（メンタルヘルス等）を支援する組織のプログラム。PMが案内できる。"},
  {t:"エモーショナルインテリジェンス（EQ）",d:"自他の感情を認識・管理する能力。PMに必要な対人スキルの基盤。共感力を含む。"}
]},
{d:"Process",q:"プロジェクトで「ゴールドプレーティング」が発生しています。これは何を意味し、なぜ問題ですか？",o:["A. 高品質な成果物を提供すること。問題ではない","B. 要求されていない追加機能を実装すること。スコープクリープとリソースの浪費につながる","C. 予算を超過すること","D. スケジュールが遅延すること"],a:1,e:"ゴールドプレーティングは、要求されていない追加機能や改善を行うことです。承認されていないスコープ変更であり、リソースの浪費につながります。",g:[
  {t:"ゴールドプレーティング",d:"要求されていない追加機能や改善を行うこと。承認されていないスコープ変更でありリソースの浪費。"},
  {t:"スコープクリープ",d:"承認されていないスコープの漸進的な拡大。変更管理プロセスを経ずにスコープが膨張する現象。"}
]},
{d:"Business Environment",q:"プロジェクトのNPV（正味現在価値）が正の値を示す場合、これは何を意味しますか？",o:["A. プロジェクトは赤字になる","B. プロジェクトの収益が投資コストを上回り、経済的に実行可能である","C. プロジェクトのリスクが高い","D. プロジェクトのスケジュールが長い"],a:1,e:"NPV > 0は、プロジェクトの将来キャッシュフローの現在価値が投資コストを上回ることを意味し、経済的に実行可能です。",g:[
  {t:"NPV（正味現在価値）",d:"将来のキャッシュフローを現在価値に割り引いた合計から投資額を引いた値。正なら経済的に実行可能。"},
  {t:"割引率",d:"将来の金額を現在価値に換算する際に使用する利率。資本コストやリスクを反映する。"}
]},
{d:"People",q:"マトリクス組織でプロジェクトを管理しています。機能マネージャーがチームメンバーを別の作業に割り当てようとしています。どうすべきですか？",o:["A. 機能マネージャーの決定に従う","B. 機能マネージャーとリソースの優先順位について交渉し、プロジェクトへの影響を説明する","C. スポンサーに即座にエスカレーションする","D. 別のメンバーで代替する"],a:1,e:"マトリクス組織では、PMと機能マネージャーの間でリソースの優先順位について交渉が必要です。プロジェクトへの影響を明確に説明します。",g:[
  {t:"マトリクス組織",d:"メンバーがPMと機能マネージャーの両方に報告する組織形態。リソース共有の利点と権限の曖昧さが特徴。"},
  {t:"機能マネージャー",d:"特定の部門や専門分野を管理する役職。マトリクス組織ではPMとリソースを共有する。"}
]},
{d:"Process",q:"プロジェクトのスコープ検証とスコープ管理の違いは？",o:["A. 同じプロセスである","B. スコープ検証は成果物の正式な受入、スコープ管理はスコープの変更を管理する","C. スコープ検証はPMが行い、スコープ管理はチームが行う","D. スコープ検証は計画時、スコープ管理は実行時に行う"],a:1,e:"スコープ検証は完了した成果物の正式な受入プロセス。スコープ管理はスコープベースラインへの変更を管理するプロセスです。",g:[
  {t:"スコープ検証",d:"完了した成果物を顧客やスポンサーが正式に受け入れるプロセス。品質管理とは別の受入確認。"},
  {t:"スコープ管理",d:"スコープベースラインへの変更を管理するプロセス。スコープクリープの防止が主な目的。"}
]},
{d:"People",q:"プロジェクトの初期段階で、チームメンバーが「これは失敗する」と悲観的な態度を示しています。最も効果的な対応は？",o:["A. 悲観的なメンバーを排除する","B. 懸念を傾聴し、具体的なリスクとして登録した上で、成功のビジョンを共有する","C. 楽観的な態度を強制する","D. 懸念を無視する"],a:1,e:"懸念を傾聴し、具体的なリスクとして管理することで、メンバーの意見を尊重しつつ、建設的な方向に導きます。",g:[
  {t:"積極的傾聴",d:"相手の言葉だけでなく感情や意図も理解しようとする聴き方。信頼関係構築の基本スキル。"},
  {t:"プロジェクトビジョン",d:"プロジェクトが目指す将来の姿。チームの方向性を統一し、モチベーションの源泉となる。"}
]},
{d:"Process",q:"プロジェクトで「ファスト・トラッキング」を適用する場合のリスクは？",o:["A. コストが増加する","B. 本来順次実行すべきアクティビティを並行実行するため、手戻りのリスクが増加する","C. 品質が低下する","D. チームの士気が低下する"],a:1,e:"ファスト・トラッキングは順次実行のアクティビティを並行実行する技法です。依存関係のあるアクティビティの並行実行は手戻りリスクを増加させます。",g:[
  {t:"ファスト・トラッキング",d:"順次実行のアクティビティを並行実行してスケジュールを短縮する技法。手戻りリスクが増加する。"},
  {t:"依存関係",d:"アクティビティ間の順序関係。FS（終了→開始）、SS、FF、SFの4種類がある。"}
]},
{d:"Process",q:"プロジェクトの「フロート（余裕時間）」がゼロのアクティビティは何を意味しますか？",o:["A. そのアクティビティは不要である","B. そのアクティビティはクリティカルパス上にあり、遅延がプロジェクト全体の遅延につながる","C. そのアクティビティは完了している","D. そのアクティビティのリソースが不足している"],a:1,e:"フロート＝0のアクティビティはクリティカルパス上にあり、その遅延はプロジェクト全体の完了日に直接影響します。",g:[
  {t:"フロート（余裕時間）",d:"アクティビティを遅延させてもプロジェクト完了日に影響しない余裕時間。ゼロならクリティカルパス上。"},
  {t:"クリティカルパス法（CPM）",d:"ネットワーク図上の最長経路を特定し、プロジェクトの最短完了期間を決定する手法。"}
]},
{d:"People",q:"プロジェクトの途中で、組織の再編が発表されました。チームメンバーが不安を感じています。PMとして最も適切な対応は？",o:["A. 再編について議論することを禁止する","B. 透明性を持って既知の情報を共有し、チームの不安に対処する","C. 再編はPMの管轄外なので無視する","D. 全員に転職を勧める"],a:1,e:"組織変更時は透明性のあるコミュニケーションが重要です。既知の情報を共有し、チームの不安に対処することでパフォーマンスを維持します。",g:[
  {t:"変革への抵抗",d:"組織変更に対するメンバーの不安や反発。透明なコミュニケーションと参加機会の提供で軽減できる。"},
  {t:"チームパフォーマンス",d:"チームが目標を達成する能力。不安や不確実性はパフォーマンスを低下させるため、PMの対処が重要。"}
]},
{d:"Process",q:"プロジェクトの「ベースライン」を変更するために必要なプロセスは？",o:["A. PMが独自に変更できる","B. 統合変更管理プロセスを通じてCCBの承認を得る","C. チームの合意があれば変更できる","D. スポンサーの口頭承認で変更できる"],a:1,e:"ベースライン（スコープ、スケジュール、コスト）の変更は、統合変更管理プロセスを通じてCCBの正式な承認が必要です。",g:[
  {t:"ベースライン",d:"承認されたプロジェクト計画の基準。スコープ、スケジュール、コストの3つがある。変更にはCCB承認が必要。"},
  {t:"統合変更管理",d:"全ての変更要求を体系的に評価・承認・管理するプロセス。ベースライン変更の唯一の正式ルート。"}
]},
{d:"Business Environment",q:"プロジェクトの「機会費用」とは何ですか？",o:["A. プロジェクトの実際のコスト","B. このプロジェクトを選択することで放棄した、次善の選択肢から得られたであろう利益","C. プロジェクトの予備費","D. プロジェクトの間接費"],a:1,e:"機会費用は、あるプロジェクトを選択することで放棄した、次善の選択肢から得られたであろう利益です。",g:[
  {t:"機会費用",d:"ある選択をすることで放棄した次善の選択肢から得られたであろう利益。プロジェクト選定の重要概念。"},
  {t:"サンクコスト（埋没費用）",d:"既に支出済みで回収不能な費用。将来の意思決定に含めるべきではない。"}
]},
{d:"People",q:"プロジェクトで、あるチームメンバーが常に他のメンバーの功績を自分のものとして報告しています。どうすべきですか？",o:["A. チーム全体の前で指摘する","B. 個別に面談し、行動の影響を説明し、改善を求める","C. 無視する","D. そのメンバーをチームから外す"],a:1,e:"個別面談で行動の影響（チームの信頼低下、士気への影響）を説明し、改善を求めることが最も適切です。",g:[
  {t:"建設的フィードバック",d:"行動の改善を促すための具体的で前向きな意見。個別に、事実に基づいて、影響を説明して伝える。"},
  {t:"チームの信頼",d:"メンバー間の相互信頼。高い信頼はコラボレーションと生産性を向上させる。PMが維持・構築する。"}
]},
{d:"Process",q:"プロジェクトの「コンティンジェンシー予備」と「マネジメント予備」の違いは？",o:["A. 同じものである","B. コンティンジェンシー予備は既知のリスク用でPMが管理、マネジメント予備は未知のリスク用で経営層が管理","C. コンティンジェンシー予備は大きく、マネジメント予備は小さい","D. コンティンジェンシー予備はスケジュール用、マネジメント予備はコスト用"],a:1,e:"コンティンジェンシー予備は特定された（既知の）リスクに対する予備でPMが管理。マネジメント予備は未知のリスクに対する予備で経営層の承認が必要です。",g:[
  {t:"コンティンジェンシー予備",d:"特定された既知のリスクに対する予備。PMが管理し、コストベースラインに含まれる。"},
  {t:"マネジメント予備",d:"未知のリスク（Unknown-Unknowns）に対する予備。経営層が管理し、予算には含まれるがベースラインには含まれない。"}
]},
{d:"Process",q:"プロジェクトの「前提条件ログ」の主な目的は？",o:["A. プロジェクトの制約を記録する","B. プロジェクト計画の基礎となる前提条件を記録し、その妥当性を継続的に検証する","C. チームメンバーのスキルを記録する","D. ステークホルダーの要求を記録する"],a:1,e:"前提条件ログは、計画の基礎となる前提条件を記録し、プロジェクト全体を通じてその妥当性を検証するためのツールです。",g:[
  {t:"前提条件ログ",d:"プロジェクト計画の基礎となる前提条件を記録し、妥当性を継続的に検証するための文書。"},
  {t:"前提条件",d:"計画時に真であると仮定した事項。検証されない前提条件はリスクの源泉となる。"}
]},
{d:"People",q:"プロジェクトで、技術的な意思決定についてPMとテクニカルリードの間で意見が分かれています。最も適切な解決方法は？",o:["A. PMの権限で決定する","B. データと事実に基づいて議論し、プロジェクト目標に最も貢献する選択肢を選ぶ","C. テクニカルリードの意見を常に優先する","D. 第三者に決定を委ねる"],a:1,e:"技術的な意思決定は、データと事実に基づいて議論し、プロジェクト目標への貢献度で判断すべきです。PMの権限で技術判断を覆すのは避けるべきです。",g:[
  {t:"データ駆動型意思決定",d:"主観や経験だけでなく、データと事実に基づいて判断を行うアプローチ。客観性を確保する。"},
  {t:"テクニカルリード",d:"プロジェクトの技術的な方向性と品質に責任を持つ役割。技術的な意思決定の専門家。"}
]},
{d:"Process",q:"プロジェクトの「構成管理」の主な目的は？",o:["A. チームの構成を管理する","B. プロジェクトの成果物とドキュメントのバージョンと変更を体系的に管理する","C. プロジェクトの予算を管理する","D. ステークホルダーの構成を管理する"],a:1,e:"構成管理は、プロジェクトの成果物、ドキュメント、ソフトウェア等のバージョンと変更を体系的に管理するプロセスです。",g:[
  {t:"構成管理",d:"成果物やドキュメントのバージョンと変更を体系的に管理するプロセス。整合性と追跡可能性を確保する。"},
  {t:"バージョン管理",d:"成果物の各版を識別・記録し、変更履歴を追跡する仕組み。構成管理の中核的な活動。"}
]},
{d:"Business Environment",q:"プロジェクトが組織の戦略目標に貢献しなくなった場合、PMはどうすべきですか？",o:["A. プロジェクトを継続する","B. スポンサーに状況を報告し、プロジェクトの継続・中止・方向転換の判断を仰ぐ","C. PMが独自にプロジェクトを中止する","D. 戦略目標を変更するよう提案する"],a:1,e:"プロジェクトの戦略的整合性が失われた場合、スポンサーに報告し、継続・中止・方向転換の判断を仰ぐことがPMの責務です。",g:[
  {t:"戦略的整合性",d:"プロジェクトの目標が組織の戦略目標と一致していること。整合性が失われたら見直しが必要。"},
  {t:"プロジェクト中止判断",d:"プロジェクトの継続が組織にとって価値がないと判断された場合の意思決定。スポンサーの権限。"}
]},
{d:"People",q:"プロジェクトの最終段階で、チームメンバーが「もう終わりだから」と品質に対する注意が低下しています。どうすべきですか？",o:["A. 品質低下を許容する","B. 品質基準の重要性を再確認し、最後まで一貫した品質を維持するようチームを鼓舞する","C. 品質チェックを省略してスケジュールを優先する","D. 外部の品質検査員を雇う"],a:1,e:"プロジェクトの最終段階でも品質基準は一貫して維持されるべきです。チームに品質の重要性を再確認し、最後まで高い基準を維持するよう鼓舞します。",g:[
  {t:"品質基準",d:"成果物が満たすべき品質の水準。プロジェクト全体を通じて一貫して維持される必要がある。"},
  {t:"品質マインドセット",d:"品質を全員の責任として捉える考え方。PMがチーム全体に浸透させるべき文化。"}
]},
{d:"Process",q:"プロジェクトの「要求事項トレーサビリティマトリクス」の主な目的は？",o:["A. チームメンバーのスキルを追跡する","B. 各要求事項がプロジェクトの成果物にどのように反映されているかを追跡する","C. プロジェクトのコストを追跡する","D. ステークホルダーの満足度を追跡する"],a:1,e:"要求事項トレーサビリティマトリクスは、各要求事項の出所から成果物への反映、テストまでの追跡を可能にするツールです。",g:[

  {t:"テーラリング",d:"プロジェクトの特性に合わせて方法論やプロセスを適応・カスタマイズすること。PMBOK第7版の重要概念。"},
  {t:"プロジェクトの複雑さ",d:"プロジェクトの技術的難易度、ステークホルダー数、不確実性等の要因。テーラリングの判断基準となる。"}

</script>
<script>
let curSet=-1,curQ=0,answers={},results={},timerInt,timeLeft=0,streak=0,cTotal=0,wTotal=0,isDark=false,QS=[];

function getApiKey(){
  let k=localStorage.getItem('gcp_tts_key');
  if(!k){k=prompt('Google Cloud TTS APIキーを入力してください（localStorageに保存されます）');if(k)localStorage.setItem('gcp_tts_key',k)}
  return k;
}
function clearApiKey(){localStorage.removeItem('gcp_tts_key');alert('APIキーを削除しました')}
let speakingAll=false,spkTimer=null,spkAudio=null;
let ttsVol=80,bgmVol=2;
function adjVol(type,dir){
  if(type==='tts'){ttsVol=Math.min(100,Math.max(0,ttsVol+dir*10));if(spkAudio)spkAudio.volume=ttsVol/100;document.getElementById('vol-tts-val').textContent=ttsVol}
  else{bgmVol=Math.min(100,Math.max(0,bgmVol+dir*5));if(bgm)bgm.volume=bgmVol/100;document.getElementById('vol-bgm-val').textContent=bgmVol}
}
function showVolControls(show){document.getElementById('vol-controls').classList.toggle('active',show)}
function estSec(text){return Math.ceil(text.length/4.5)}
function startSpkProgress(totalSec){
  clearInterval(spkTimer);
  let elapsed=0;
  const pg=document.getElementById('speak-progress'),fill=document.getElementById('speak-fill'),tm=document.getElementById('speak-time');
  if(!pg)return;
  pg.classList.add('active');
  const update=()=>{const rem=Math.max(totalSec-elapsed,0);fill.style.width=`${Math.min(elapsed/totalSec*100,100)}%`;tm.textContent=`${rem}s`};
  update();
  spkTimer=setInterval(()=>{elapsed++;update();if(elapsed>=totalSec)clearInterval(spkTimer)},1000);
}
function stopSpkProgress(){
  clearInterval(spkTimer);
  const pg=document.getElementById('speak-progress');
  if(pg)pg.classList.remove('active');
}
async function gcpSpeak(text){
  const key=getApiKey();if(!key)throw new Error('No API key');
  const r=await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({input:{text},voice:{languageCode:'ja-JP',name:'ja-JP-Neural2-B'},audioConfig:{audioEncoding:'MP3',speakingRate:1.05}})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'TTS error')}
  const d=await r.json();
  return d.audioContent;
}
async function speakChunks(chunks,btn,onDone){
  if(!chunks.length||!speakingAll){btn&&btn.classList.remove('speaking');stopSpkProgress();if(onDone)onDone();return}
  try{
    const allText=chunks.join('。');
    const b64=await gcpSpeak(allText);
    spkAudio=new Audio('data:audio/mp3;base64,'+b64);
    spkAudio.volume=ttsVol/100;
    if('mediaSession' in navigator){
      navigator.mediaSession.metadata=new MediaMetadata({title:'PMP模擬試験',artist:'読み上げ中'});
      navigator.mediaSession.setActionHandler('pause',()=>stopSpeaking());
      navigator.mediaSession.setActionHandler('play',()=>{if(spkAudio)spkAudio.play()});
    }
    spkAudio.onended=()=>{spkAudio=null;if(onDone)onDone()};
    spkAudio.onerror=()=>{btn&&btn.classList.remove('speaking');speakingAll=false;stopSpkProgress()};
    await spkAudio.play();
  }catch(e){alert('TTS Error: '+e.message+'\n\nAPIキーを確認してください。コンソールでclearApiKey()を実行すると再入力できます。');btn&&btn.classList.remove('speaking');speakingAll=false;stopSpkProgress()}
}
// === Lofi BGM ===
const BGM_SRC='bgm.mp3';
let bgm=null,bgmOn=false;
function toggleBgm(){
  bgmOn=!bgmOn;
  document.getElementById('bgm-toggle').textContent=bgmOn?'ON':'OFF';
  if(bgmOn&&speakingAll)startBgm();else stopBgm();
}
function startBgm(){
  if(bgm||!bgmOn)return;
  bgm=new Audio(BGM_SRC);
  bgm.loop=true;
  bgm.play().catch(()=>{});
}
function stopBgm(){if(bgm){bgm.pause();bgm=null}}

function stopSpeaking(){
  speakingAll=false;
  if(spkAudio){spkAudio.pause();spkAudio=null}
  stopSpkProgress();stopBgm();showVolControls(false);
  document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking'));
}

function speakFrom(idx){
  if(idx>=QS.length||!speakingAll){stopSpeaking();return}
  showQuestion(idx);
  const q=QS[idx],ans=q.o[q.a].replace(/^[A-D]\.\s*/,'');
  const pause=idx>0?'......。':'';
  const chunks=[`${pause}${q.q}。正解は、${ans}。解説です。${q.e}`];
  const totalSec=estSec(chunks.join(''));
  const btn=document.querySelector('.speak-btn');
  btn&&btn.classList.add('speaking');
  startSpkProgress(totalSec);
  speakChunks(chunks,btn,()=>{if(speakingAll)speakFrom(idx+1)});
}
function speakQuestion(idx){
  if(speakingAll){stopSpeaking();return}
  speakingAll=true;
  showVolControls(true);
  startBgm();
  speakFrom(idx);
}
const TIME_PER_Q=76;

function toggleTheme(){isDark=!isDark;document.documentElement.setAttribute('data-theme',isDark?'dark':'light');document.querySelector('.theme-toggle').textContent=isDark?'🌙':'☀️'}

function getScores(){try{return JSON.parse(localStorage.getItem('pmp_scores')||'{}')}catch{return{}}}
function saveScore(idx,pct){const s=getScores();const k='set_'+idx;if(!s[k]||pct>s[k])s[k]=pct;localStorage.setItem('pmp_scores',JSON.stringify(s))}

function showModal(title,msg,buttons){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-msg').textContent=msg;
  const bc=document.getElementById('modal-buttons');bc.innerHTML='';
  buttons.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='btn '+(b.cls||'btn-secondary');
    btn.textContent=b.text;
    btn.onclick=()=>{hideModal();if(b.fn)b.fn()};
    bc.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('show');
}
function hideModal(){document.getElementById('modal-overlay').classList.remove('show')}

function switchScreen(id){
  stopSpeaking();
  ['select-screen','exam-screen','result-screen'].forEach(s=>document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('home-btn').style.display=id==='select-screen'?'none':'inline-block';
}

function showMenu(){switchScreen('select-screen');clearInterval(timerInt);
  const sl=document.getElementById('set-list');sl.innerHTML='';const scores=getScores();
  EXAM_SETS.forEach((s,i)=>{
    const hs=scores['set_'+i];
    const hsHtml=hs!==undefined?`<span class="high-score">🏆 ハイスコア: ${hs}%</span>`:'<span>未プレイ</span>';
    const div=document.createElement('div');
    div.className='set-card';
    div.innerHTML=`<h3>${s.name}</h3><p>${s.desc}</p><div class="meta"><span>📝 ${s.questions.length}問</span><span>⏱ ${Math.ceil(s.questions.length*TIME_PER_Q/60)}分</span>${hsHtml}</div>`;
    div.addEventListener('click',function(){startExam(i)});
    sl.appendChild(div);
  });
}

function startExam(idx){
  curSet=idx;QS=EXAM_SETS[idx].questions;curQ=0;answers={};results={};streak=0;cTotal=0;wTotal=0;
  timeLeft=QS.length*TIME_PER_Q;
  switchScreen('exam-screen');buildNav();showQuestion(0);startTimer();
}

function confirmReset(){
  showModal('最初からやり直す','現在の進捗はリセットされます。よろしいですか？',[
    {text:'キャンセル',cls:'btn-secondary'},
    {text:'やり直す',cls:'btn-danger',fn:()=>startExam(curSet)}
  ]);
}

function confirmHome(){
  if(curSet>=0&&Object.keys(results).length>0&&Object.keys(results).length<QS.length){
    showModal('ホームに戻る','試験の途中です。進捗は保存されません。よろしいですか？',[
      {text:'続ける',cls:'btn-secondary'},
      {text:'ホームに戻る',cls:'btn-primary',fn:showMenu}
    ]);
  }else{showMenu()}
}

function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timeLeft--;if(timeLeft<=0){clearInterval(timerInt);showResults();return}
    const m=Math.floor(timeLeft/60),s=timeLeft%60;
    const el=document.getElementById('timer');
    el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className=timeLeft<120?'timer warning':'timer';
  },1000);
}

function buildNav(){
  const c=document.getElementById('nav-dots');c.innerHTML='';
  QS.forEach((_,i)=>{const d=document.createElement('div');d.className='nav-dot'+(i===0?' current':'');d.textContent=i+1;d.onclick=()=>{if(speakingAll){if(spkAudio){spkAudio.pause();spkAudio=null}stopSpkProgress();speakFrom(i)}else showQuestion(i)};c.appendChild(d)});
}
function updateNav(){document.querySelectorAll('.nav-dot').forEach((d,i)=>{d.className='nav-dot';if(i===curQ)d.classList.add('current');if(results[i]===true)d.classList.add('answered-correct');else if(results[i]===false)d.classList.add('answered-wrong')})}
function updateStreak(){const el=document.getElementById('streak-bar');const t=Object.keys(results).length;if(streak>=3)el.innerHTML=`🔥 <span>${streak}問連続正解！</span>`;else if(t>0)el.innerHTML=`正解率: <span>${cTotal}/${t}</span> (${Math.round(cTotal/t*100)}%)`;else el.innerHTML=''}

function showQuestion(idx){
  curQ=idx;const q=QS[idx];const locked=results[idx]!==undefined;
  document.getElementById('q-counter').textContent=`${idx+1}/${QS.length}`;
  document.getElementById('progress-fill').style.width=`${((idx+1)/QS.length)*100}%`;
  document.getElementById('correct-count').textContent=cTotal;
  document.getElementById('wrong-count').textContent=wTotal;
  const dc=q.d==='People'?'people':q.d==='Process'?'process':'business';
  let h=`<div class="card"><div class="q-header"><span class="q-number">問題 ${idx+1}</span><div class="speak-wrap"><button class="speak-btn" onclick="speakQuestion(${idx})" title="読み上げ">🔊</button><div class="speak-progress" id="speak-progress"><div class="bar"><div class="fill-s" id="speak-fill"></div></div><span class="time" id="speak-time"></span></div></div><span class="q-domain ${dc}">${q.d}</span></div><div class="q-text">${q.q}</div><div class="options">`;
  q.o.forEach((o,i)=>{
    let cls='option';
    if(locked){cls+=' locked';if(i===q.a)cls+=' correct';else if(i===answers[idx]&&i!==q.a)cls+=' wrong';else cls+=' dim'}
    h+=`<div class="${cls}" ${locked?'':`onclick="selectOpt(${idx},${i})"`}><span style="flex:1">${o}</span></div>`;
  });
  h+=`</div>`;
  if(locked){
    const ic=results[idx];
    h+=`<div class="explanation show"><strong>${ic?'✅ 正解！':'❌ 不正解'}</strong><br><br>${q.e}`;
    if(q.g&&q.g.length>0){
      h+=`<div class="glossary"><div class="glossary-title">📖 用語解説</div>`;
      q.g.forEach(g=>{h+=`<div class="glossary-item"><span class="term">${g.t}:</span> <span class="def">${g.d}</span></div>`});
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById('question-area').innerHTML=h;
  const nb=document.getElementById('next-btn'),fb=document.getElementById('finish-btn');
  if(locked&&idx<QS.length-1){nb.style.display='inline-block';fb.style.display='none'}
  else if(locked&&idx===QS.length-1){nb.style.display='none';fb.style.display='inline-block'}
  else{nb.style.display='none';fb.style.display='none'}
  updateNav();updateStreak();
}

function selectOpt(qi,oi){if(results[qi]!==undefined)return;answers[qi]=oi;const ic=oi===QS[qi].a;results[qi]=ic;if(ic){cTotal++;streak++}else{wTotal++;streak=0}showQuestion(qi)}
function prevQ(){if(curQ>0)showQuestion(curQ-1)}
function nextQ(){if(curQ<QS.length-1)showQuestion(curQ+1)}

function showResults(){
  clearInterval(timerInt);switchScreen('result-screen');
  const pct=Math.round((cTotal/QS.length)*100);saveScore(curSet,pct);const pass=pct>=65;
  document.getElementById('result-title').textContent=pass?'🎉 合格ライン到達！':'📚 もう少し頑張ろう！';
  document.getElementById('result-title').style.color=pass?'var(--correct)':'var(--wrong)';
  document.getElementById('score-num').textContent=`${pct}%`;
  document.getElementById('score-circle').className=`score-circle ${pass?'score-pass':'score-fail'}`;
  const elapsed=QS.length*TIME_PER_Q-timeLeft;const em=Math.floor(elapsed/60),es=elapsed%60;
  document.getElementById('result-msg').textContent=`${cTotal}/${QS.length} 正解 | 所要時間: ${em}分${es}秒 | ${pass?'合格ライン(65%)クリア':'合格ライン(65%)未到達'}`;
  let ds={People:{c:0,t:0},Process:{c:0,t:0},"Business Environment":{c:0,t:0}};
  QS.forEach((q,i)=>{ds[q.d].t++;if(results[i])ds[q.d].c++});
  const bd=document.getElementById('domain-breakdown');bd.innerHTML='';
  for(const[n,s]of Object.entries(ds)){const dp=s.t>0?Math.round((s.c/s.t)*100):0;const col=n==='People'?'#1565c0':n==='Process'?'#2e7d32':'#e65100';bd.innerHTML+=`<div class="domain-row"><div class="name">${n} (${s.c}/${s.t})</div><div class="bar"><div class="fill-d" style="width:${dp}%;background:${col}"></div></div><div class="pct" style="color:${col}">${dp}%</div></div>`}
  const rl=document.getElementById('review-list');rl.innerHTML='';
  QS.forEach((q,i)=>{const ic=results[i];const ua=answers[i]!==undefined?q.o[answers[i]]:'未回答';rl.innerHTML+=`<div class="review-item" onclick="this.querySelector('.explanation').classList.toggle('show')"><div class="ri-header"><span style="color:var(--text2)">問${i+1} [${q.d}]</span><span class="ri-status ${ic?'ri-correct':'ri-wrong'}">${ic?'✓ 正解':'✗ 不正解'}</span></div><p style="margin:5px 0;font-size:13px">${q.q.substring(0,70)}...</p>${!ic?`<p style="font-size:11px;color:var(--correct)">正解: ${q.o[q.a]}</p>`:''}<div class="explanation"><strong>解説:</strong> ${q.e}${q.g&&q.g.length?'<div class="glossary"><div class="glossary-title">📖 用語解説</div>'+q.g.map(g=>`<div class="glossary-item"><span class="term">${g.t}:</span> <span class="def">${g.d}</span></div>`).join('')+'</div>':''}</div></div>`});
}

showMenu();
</script>
